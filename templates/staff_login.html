{% extends "base.html" %}

{% block title %}Staff Login{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0"><i class="fas fa-users"></i> Staff Login</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('staff_login') }}">
                    <div class="mb-3">
                        <label class="form-label">Email / Phone Number / Username</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                        <div class="form-text">Use your registered email, phone number, or username</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-success w-100">Staff Login</button>
                </form>
                <hr>
                <p class="text-center mb-0">
                                    <a href="{{ url_for('register') }}">Register New Account</a> &nbsp;|&nbsp;
                    <a href="{{ url_for('admin_login') }}">Admin Login</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
